name: Build Windows EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to publish a Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build portable .exe
        run: npm run package

      # Always available from the Actions run page (handy for branch/dispatch builds).
      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: BrennanPricingTool-portable
          path: release/*.exe
          if-no-files-found: error

      # On a version tag (v*), publish a downloadable GitHub Release with the .exe.
      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
